<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="20" fill="#4F46E5"/>
  <g fill="#ffffff">
    <!-- Monitor/Server icon -->
    <rect x="25" y="22" width="50" height="34" rx="4" fill="none" stroke="#ffffff" stroke-width="4"/>
    <line x1="50" y1="56" x2="50" y2="66" stroke="#ffffff" stroke-width="4"/>
    <line x1="35" y1="66" x2="65" y2="66" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <!-- Gear icon (service management) -->
    <circle cx="72" cy="32" r="8" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="72" cy="32" r="3" fill="#ffffff"/>
    <!-- Network nodes -->
    <circle cx="30" cy="80" r="4" fill="#A5B4FC"/>
    <circle cx="50" cy="80" r="4" fill="#A5B4FC"/>
    <circle cx="70" cy="80" r="4" fill="#A5B4FC"/>
    <line x1="30" y1="80" x2="50" y2="80" stroke="#A5B4FC" stroke-width="2"/>
    <line x1="50" y1="80" x2="70" y2="80" stroke="#A5B4FC" stroke-width="2"/>
    <line x1="50" y1="66" x2="50" y2="76" stroke="#A5B4FC" stroke-width="2"/>
    <line x1="50" y1="66" x2="30" y2="76" stroke="#A5B4FC" stroke-width="2" opacity="0.5"/>
    <line x1="50" y1="66" x2="70" y2="76" stroke="#A5B4FC" stroke-width="2" opacity="0.5"/>
  </g>
