<!doctype html>
{%- set _theme = boot.desk_theme or "light" -%}
{%- if _theme == "automatic" -%}
  <html class="h-full" lang="en">
{%- else -%}
  <html class="h-full" lang="en" data-theme="{{ _theme }}">
{%- endif -%}
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover maximum-scale=1.0, user-scalable=no" />
    <title>Employee Self Service</title>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ESS Portal" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      {% for key in boot %}
      window["{{ key }}"] = {{ boot[key] | tojson }};
      {% endfor %}
    </script>
    <script>
      (function() {
        var t = window.desk_theme || 'light';
        if (t === 'automatic') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
   
    <script type="module" crossorigin src="/assets/employee_self_service/frontend/assets/index-012195ff.js"></script>
    <link rel="stylesheet" href="/assets/employee_self_service/frontend/assets/index-8fb79bbd.css">
  </head>
  <body class="h-full antialiased">
    <div id="app" class="h-full"></div>
          </body>
          
</html>
